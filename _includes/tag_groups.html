<div class="tag-groups">
  <div class="tag-group performer-tags" aria-label="出演者">
    <span class="tag-label">
      <svg class="tag-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
        <path d="M12 19v3"></path>
      </svg>
      <span class="sr-only">出演者</span>
    </span>
    <div class="tags">
      {% for performer in include.episode.performers %}
        <a class="{% if performer == 'ゲスト' or performer == '萩' or performer == '脇' or performer == '藤' %}host-tag{% endif %}" href="{{ '/episodes/' | relative_url }}?performer={{ performer | uri_escape }}" data-filter-type="performer">{{ performer }}</a>
      {% else %}
        <span>未設定</span>
      {% endfor %}
    </div>
  </div>
  <div class="tag-group topic-tags" aria-label="トピック">
    <span class="tag-label">
      <svg class="tag-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 14c.2-1 .7-1.7 1.5-2.5A5 5 0 1 0 8 11.5c.8.8 1.3 1.5 1.5 2.5"></path>
        <path d="M9 18h6"></path>
        <path d="M10 22h4"></path>
      </svg>
      <span class="sr-only">Topics</span>
    </span>
    <div class="tags">
      {% for topic in include.episode.topics %}
        <a href="{{ '/episodes/' | relative_url }}?topic={{ topic | uri_escape }}" data-filter-type="topic">{{ topic }}</a>
      {% else %}
        <span>未設定</span>
      {% endfor %}
    </div>
  </div>
</div>
