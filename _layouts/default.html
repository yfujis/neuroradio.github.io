<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% if page.title %}{{ page.title }} | {% endif %}NeuroRadio</title>
  <meta name="description" content="{{ page.summary | default: site.description | strip_html | escape }}">
  {% if page.robots %}<meta name="robots" content="{{ page.robots }}">{% endif %}
  <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}NeuroRadio">
  <meta property="og:description" content="{{ page.summary | default: site.description | strip_html | escape }}">
  <meta property="og:type" content="{% if page.layout == 'episode' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ '/assets/neuroradio-cover.png' | absolute_url }}">
  <meta property="og:image:secure_url" content="{{ '/assets/neuroradio-cover.png' | absolute_url }}">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="3000">
  <meta property="og:image:height" content="3000">
  <meta property="og:image:alt" content="NeuroRadio podcast cover art">
  <meta property="og:site_name" content="NeuroRadio">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:site" content="@NeuroRadio_">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }} | {% endif %}NeuroRadio">
  <meta name="twitter:description" content="{{ page.summary | default: site.description | strip_html | escape }}">
  <meta name="twitter:image" content="{{ '/assets/neuroradio-cover.png' | absolute_url }}">
  <meta name="twitter:image:alt" content="NeuroRadio podcast cover art">
  <link rel="icon" type="image/png" href="{{ '/assets/neuroradio-cover.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/neuroradio-cover.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/styles.css?v=20260528' | relative_url }}">
</head>
<body>
  <a class="skip-link" href="#main">本文へスキップ</a>
  {% include header.html %}
  {{ content }}
  <script src="{{ '/script.js?v=20260528' | relative_url }}"></script>
</body>
</html>
